<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d2b" />
    <title>넘버 트럭 러너</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="stage-wrap">
        <canvas id="game-canvas" width="480" height="854"></canvas>

        <button id="pause-btn" class="icon-btn" aria-label="일시정지">❚❚</button>

        <div id="screen-menu" class="screen">
          <div class="panel">
            <h1>넘버 트럭 러너</h1>
            <p class="tagline">고철 손수레에서 전설의 기계로.<br />숫자를 불려 도로 끝까지 달려라.</p>
            <div class="howto">
              <div><b>조작</b> — 화면을 좌우로 드래그(또는 탭)해 레인 이동</div>
              <div><b>목표</b> — 게이트로 전력을 불리고, 진화하며, 보스를 돌파</div>
            </div>
            <button id="btn-start" class="btn primary">게임 시작</button>
          </div>
        </div>

        <div id="screen-intro" class="screen hidden">
          <div class="panel">
            <div class="stage-badge" id="intro-stage-badge">STAGE 1</div>
            <h2 id="intro-biome">폐차장 초입</h2>
            <p id="intro-lore" class="lore"></p>
            <div class="mechanic-tag" id="intro-mechanic"></div>
            <button id="btn-intro-go" class="btn primary">출발</button>
          </div>
        </div>

        <div id="screen-clear" class="screen hidden">
          <div class="panel">
            <h2>스테이지 클리어!</h2>
            <p id="clear-lore" class="lore"></p>
            <div class="stat-row"><span>도달 전력</span><b id="clear-power"></b></div>
            <div class="stat-row"><span>도달 티어</span><b id="clear-tier"></b></div>
            <button id="btn-next-stage" class="btn primary">다음 스테이지</button>
          </div>
        </div>

        <div id="screen-gameover" class="screen hidden">
          <div class="panel">
            <h2 class="danger">게임 오버</h2>
            <p class="lore" id="gameover-line"></p>
            <div class="stat-row"><span>도달 스테이지</span><b id="gameover-stage"></b></div>
            <div class="stat-row"><span>최종 전력</span><b id="gameover-power"></b></div>
            <div class="stat-row"><span>도달 티어</span><b id="gameover-tier"></b></div>
            <button id="btn-retry" class="btn primary">다시 도전</button>
          </div>
        </div>

        <div id="screen-victory" class="screen hidden">
          <div class="panel">
            <h2 class="legendary">완주!</h2>
            <p class="lore" id="victory-lore"></p>
            <div class="stat-row"><span>최종 전력</span><b id="victory-power"></b></div>
            <div class="stat-row"><span>최종 티어</span><b id="victory-tier"></b></div>
            <button id="btn-restart" class="btn primary">처음부터 다시</button>
          </div>
        </div>

        <div id="screen-pause" class="screen hidden">
          <div class="panel">
            <h2>일시정지</h2>
            <button id="btn-resume" class="btn primary">계속하기</button>
            <button id="btn-pause-restart" class="btn">처음부터</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
